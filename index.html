<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kỹ năng phân tích nội dung và Phát hiện Tin Giả</title>
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">

    <!-- Main Application Container (Landscape Tablet Optimization) -->
    <main id="app-container" class="relative bg-gray-800 rounded-3xl shadow-2xl overflow-hidden flex flex-col w-full max-w-6xl aspect-[4/3] md:aspect-[16/10]">
        
        <!-- Header -->
        <header class="bg-gray-950 px-6 py-4 flex justify-between items-center shadow-md z-10 shrink-0 border-b border-gray-700">
            <h1 class="text-xl md:text-2xl font-bold text-yellow-400 drop-shadow-md tracking-wide">
                Phát Hiện Tin Giả
            </h1>
            <div class="flex items-center gap-6">
                <div class="text-lg md:text-xl font-semibold bg-gray-800 px-5 py-2 rounded-full border border-gray-600 shadow-inner">
                    <span id="level-display" class="text-blue-300">Bài học: Màn 1/4</span>
                </div>
            </div>
        </header>

        <!-- Content Area -->
        <div class="flex-1 overflow-y-auto p-6 md:p-10 custom-scrollbar relative reading-area" id="reading-area">
            <div id="article-title" class="text-2xl md:text-4xl font-extrabold text-white mb-6 pb-4 border-b border-gray-700 leading-tight">
                <!-- Title Injected Here -->
            </div>
            
            <div id="article-content" class="text-lg md:text-xl lg:text-2xl leading-relaxed md:leading-loose text-gray-300 select-none">
                <!-- Content Injected Here -->
            </div>
        </div>

        <!-- Footer / Action Bar -->
        <footer class="bg-gray-950 px-6 py-5 flex justify-between items-center shadow-[0_-4px_20px_rgba(0,0,0,0.5)] z-10 shrink-0 border-t border-gray-700">
            <div class="text-sm md:text-lg text-gray-400 flex items-center gap-2">
                <span>Số lần thử:</span>
                <span id="attempts-display" class="font-bold text-yellow-400 text-xl bg-gray-800 px-3 py-1 rounded-md border border-gray-600">0 / 2</span>
            </div>
            <div class="flex gap-4">
                <button id="btn-reset" class="px-5 py-2 md:px-8 md:py-3 bg-gray-700 hover:bg-gray-600 text-white rounded-lg font-bold transition-all shadow-md active:scale-95 text-sm md:text-base border border-gray-500">
                    Xóa hết đánh dấu
                </button>
                <button id="btn-verify" class="px-5 py-2 md:px-8 md:py-3 bg-yellow-500 hover:bg-yellow-400 text-gray-900 rounded-lg font-bold transition-all shadow-[0_0_15px_rgba(234,179,8,0.4)] hover:shadow-[0_0_25px_rgba(234,179,8,0.6)] active:scale-95 text-sm md:text-base border border-yellow-600">
                    Kiểm tra kết quả
                </button>
            </div>
        </footer>

        <!-- Toast Notification -->
        <div id="toast" class="absolute top-20 left-1/2 transform -translate-x-1/2 bg-red-600 border-2 border-red-400 text-white px-8 py-4 rounded-xl shadow-2xl font-bold opacity-0 pointer-events-none transition-opacity duration-300 z-50 text-center w-11/12 md:w-auto md:max-w-2xl text-lg md:text-xl">
            <span id="toast-msg"></span>
        </div>

        <!-- Success/Feedback Modal -->
        <div id="modal" class="absolute inset-0 bg-gray-900/90 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4 opacity-0 transition-opacity duration-500">
            <div class="bg-gray-800 border-2 border-gray-600 rounded-3xl p-10 max-w-3xl w-full text-center shadow-[0_0_50px_rgba(0,0,0,0.8)] transform scale-95 transition-transform duration-500 flex flex-col items-center" id="modal-content">
                <div id="modal-icon" class="text-7xl mb-6 drop-shadow-lg">🎉</div>
                <h2 id="modal-title" class="text-4xl md:text-5xl font-extrabold text-white mb-6 tracking-tight">Kết quả xuất sắc!</h2>
                <div class="w-full bg-gray-900 rounded-xl p-6 mb-8 border border-gray-700 shadow-inner">
                    <p id="modal-desc" class="text-gray-300 text-lg md:text-xl leading-relaxed text-left">
                        <!-- Modal description -->
                    </p>
                </div>
                <button id="btn-next" class="px-10 py-4 bg-green-500 hover:bg-green-400 text-white rounded-xl font-extrabold text-xl transition-all shadow-[0_0_20px_rgba(34,197,94,0.4)] hover:shadow-[0_0_30px_rgba(34,197,94,0.6)] active:scale-95 border border-green-600 w-full md:w-auto">
                    Tiến vào Bài tiếp theo
                </button>
            </div>
        </div>

        <!-- Completion Screen -->
        <div id="completion-screen" class="absolute inset-0 bg-gray-900 hidden flex-col items-center justify-center z-50 p-8 opacity-0 transition-opacity duration-1000">
            <div class="text-8xl mb-8 animate-bounce">🏆</div>
            <h1 class="text-5xl md:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-orange-500 to-red-500 mb-6 text-center drop-shadow-sm">
                Hoàn Thành Khóa Học!
            </h1>
            <p class="text-xl md:text-2xl text-gray-300 max-w-3xl text-center leading-relaxed mb-10">
                Chúc mừng bạn đã xuất sắc vượt qua các thử thách phân tích nội dung. Kỹ năng nhận diện tin giả của bạn đã đạt mức chuyên gia!
            </p>
            <button onclick="location.reload()" class="px-8 py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold text-xl transition-all shadow-[0_0_20px_rgba(37,99,235,0.4)] active:scale-95 border border-blue-400">
                Làm lại từ đầu
            </button>
        </div>

    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
