<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kỹ năng phân tích nội dung và Phát hiện Tin Giả</title>
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen flex items-center justify-center p-4">

    <!-- Top App Header -->
    <div class="fixed top-0 left-0 w-full bg-white/80 backdrop-blur-md border-b border-gray-200 px-6 py-3 flex justify-between items-center z-40 shadow-sm">
        <h1 class="text-xl md:text-2xl font-extrabold text-blue-600 tracking-tight">
            Phát Hiện Tin Giả
        </h1>
        <div class="flex items-center gap-6">
            <div class="text-sm md:text-base font-bold bg-blue-50 text-blue-800 px-5 py-2 rounded-full border border-blue-200 shadow-sm">
                <span id="level-display">Bài học: Màn 1/4</span>
            </div>
        </div>
    </div>

    <!-- Main Application Container (Landscape Tablet Optimization & Simulated Browser) -->
    <main id="app-container" class="relative bg-white rounded-xl shadow-[0_10px_40px_rgba(0,0,0,0.1)] overflow-hidden flex flex-col w-full max-w-6xl aspect-[4/3] md:aspect-[16/10] mt-16 border border-gray-300">
        
        <!-- Simulated Browser Chrome Header -->
        <header class="bg-gray-50 px-4 py-3 flex items-center gap-4 border-b border-gray-300 z-10 shrink-0">
            <!-- Nav Buttons -->
            <div class="flex gap-2 text-gray-400">
                <button class="p-1 hover:bg-gray-200 rounded-full transition-colors cursor-not-allowed">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
                <button class="p-1 hover:bg-gray-200 rounded-full transition-colors cursor-not-allowed">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
                <button class="p-1 hover:bg-gray-200 rounded-full transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
            <!-- Address Bar -->
            <div class="flex-1 flex items-center bg-white border border-gray-300 rounded-full px-4 py-1.5 shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-green-600 mr-2" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                </svg>
                <span id="browser-url" class="text-sm md:text-base text-gray-700 font-medium truncate select-all">
                    https://baochinhthuc-giaoduc.vn/...
                </span>
            </div>
        </header>

        <!-- Content Area (Newspaper Layout) -->
        <div class="flex-1 overflow-y-auto p-6 md:p-10 custom-scrollbar relative reading-area bg-white" id="reading-area">
            
            <div class="max-w-4xl mx-auto">
                <!-- Metadata -->
                <div class="mb-4">
                    <span id="article-category" class="inline-block px-3 py-1 bg-red-100 text-red-700 font-bold text-xs md:text-sm rounded mb-3 tracking-widest">
                        THỂ LOẠI
                    </span>
                    <h2 id="article-title" class="text-3xl md:text-4xl lg:text-5xl font-extrabold text-gray-900 mb-4 leading-tight">
                        <!-- Title Injected Here -->
                    </h2>
                    <div id="article-date" class="text-sm md:text-base text-gray-500 font-medium pb-6 border-b border-gray-200">
                        <!-- Date Injected Here -->
                    </div>
                </div>
                
                <!-- Body Text -->
                <div id="article-content" class="text-lg md:text-xl lg:text-2xl leading-relaxed md:leading-loose text-gray-800 select-none mt-6">
                    <!-- Paragraphs Injected Here -->
                </div>
            </div>

        </div>

        <!-- Footer / Action Bar -->
        <footer class="bg-white px-6 py-5 flex justify-between items-center shadow-[0_-4px_20px_rgba(0,0,0,0.05)] z-10 shrink-0 border-t border-gray-200">
            <div class="text-sm md:text-lg text-gray-600 flex items-center gap-2">
                <span class="font-medium">Số lần thử:</span>
                <span id="attempts-display" class="font-bold text-gray-900 text-xl bg-gray-100 px-3 py-1 rounded-md border border-gray-300">0 / 2</span>
            </div>
            <div class="flex gap-3 md:gap-4">
                <button id="btn-reset" class="px-4 py-2 md:px-8 md:py-3 bg-white hover:bg-gray-50 text-gray-700 rounded-lg font-bold transition-all shadow-sm active:scale-95 text-sm md:text-base border border-gray-300">
                    Xóa hết đánh dấu
                </button>
                <button id="btn-verify" class="px-5 py-2 md:px-8 md:py-3 bg-yellow-400 hover:bg-yellow-300 text-gray-900 rounded-lg font-bold transition-all shadow-md active:scale-95 text-sm md:text-base border border-yellow-500">
                    Kiểm tra kết quả
                </button>
            </div>
        </footer>

        <!-- Toast Notification -->
        <div id="toast" class="absolute top-24 left-1/2 transform -translate-x-1/2 bg-white border border-gray-200 text-gray-900 px-8 py-4 rounded-xl shadow-2xl font-medium opacity-0 pointer-events-none transition-opacity duration-300 z-50 text-center w-11/12 md:w-auto md:max-w-2xl text-base md:text-lg flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-orange-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            <span id="toast-msg"></span>
        </div>

        <!-- Success/Feedback Modal -->
        <div id="modal" class="absolute inset-0 bg-gray-900/40 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4 opacity-0 transition-opacity duration-500">
            <div class="bg-white border border-gray-200 rounded-2xl p-8 md:p-10 max-w-2xl w-full text-center shadow-2xl transform scale-95 transition-transform duration-500 flex flex-col items-center" id="modal-content">
                <div id="modal-icon" class="text-6xl md:text-7xl mb-4 drop-shadow-sm">🎉</div>
                <h2 id="modal-title" class="text-3xl md:text-4xl font-extrabold text-gray-900 mb-4 tracking-tight">Kết quả xuất sắc!</h2>
                <div class="w-full bg-gray-50 rounded-xl p-5 mb-8 border border-gray-100 shadow-inner">
                    <p id="modal-desc" class="text-gray-700 text-lg md:text-xl leading-relaxed text-left font-medium">
                        <!-- Modal description -->
                    </p>
                </div>
                <button id="btn-next" class="px-8 py-3 bg-green-500 hover:bg-green-600 text-white rounded-xl font-bold text-lg transition-all shadow-md active:scale-95 border border-green-600 w-full md:w-auto">
                    Tiến vào Bài tiếp theo
                </button>
            </div>
        </div>

        <!-- Completion Screen -->
        <div id="completion-screen" class="absolute inset-0 bg-white hidden flex-col items-center justify-center z-50 p-8 opacity-0 transition-opacity duration-1000">
            <div class="text-8xl mb-8 animate-bounce">🏆</div>
            <h1 class="text-4xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600 mb-6 text-center">
                Hoàn Thành Khóa Học!
            </h1>
            <p class="text-xl md:text-2xl text-gray-600 max-w-2xl text-center leading-relaxed mb-10">
                Chúc mừng bạn đã xuất sắc vượt qua các thử thách phân tích nội dung. Kỹ năng nhận diện tin giả của bạn đã đạt mức chuyên gia!
            </p>
            <button onclick="location.reload()" class="px-8 py-4 bg-gray-900 hover:bg-gray-800 text-white rounded-xl font-bold text-xl transition-all shadow-lg active:scale-95">
                Làm lại từ đầu
            </button>
        </div>

    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
